services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: order
      POSTGRES_PASSWORD: order
      POSTGRES_DB: order
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - data_local_postgres:/var/lib/postgresql/data
volumes:
  data_local_postgres:
